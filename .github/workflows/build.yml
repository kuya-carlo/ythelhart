name: Build Executables

on:
  push:
    paths:
      - 'src/**'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    outputs:
      linux_url: ${{ steps.save-url.outputs.linux_url }}
      windows_url: ${{ steps.save-url.outputs.windows_url }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: Ythelhart-Linux
            separator: ":"
            binary-name: Ythelhart
          - os: windows-latest
            artifact-name: Ythelhart-Windows
            separator: ";"
            binary-name: Ythelhart.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        shell: bash
        run: |
          pyinstaller --onefile --windowed --add-data "assets/music${{ matrix.separator }}assets/music" --add-data "assets/images${{ matrix.separator }}assets/images" --add-data "assets/fonts${{ matrix.separator }}assets/fonts" --name Ythelhart src/main.py

      - name: Upload artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.binary-name }}
          retention-days: 30

      - name: Save URL
        id: save-url
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            echo "linux_url=${{ steps.upload-artifact.outputs.artifact-url }}" >> $GITHUB_OUTPUT
          else
            echo "windows_url=${{ steps.upload-artifact.outputs.artifact-url }}" >> $GITHUB_OUTPUT
          fi

      # Optional: Create release when pushing a tag
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.binary-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  comment:
    name: Post Commit Comment
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Post commit comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body="### Build Artifacts Available 🚀

            The compilation for both platforms has completed successfully. You can download the compiled executables directly:
            - [Download (Windows)](${{ needs.build.outputs.windows_url }})
            - [Download (Linux)](${{ needs.build.outputs.linux_url }})"
